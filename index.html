<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroSoft | Campo APP</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Estilos -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash Screen -->
<div id="splash-screen">
  <img src="logo_fainver.png" alt="FAINVER EAS">
  <h2>AgroSoft Campo</h2>
  <small>Control de Compras y Costos en Ganadería</small>
</div>

<!-- HEADER APP -->
<header class="header-sistema">
  <div class="logo-empresa">
    <img src="logo_fainver.png" alt="FAINVER EAS">
  </div>
  <div class="titulo-sistema">
    <h1>AgroSoft Campo</h1>
    <small>Control de Compras y Costos en Ganadería</small>
  </div>
  <div class="logo-desarrollador">
    <img src="logoisabsoft.png" alt="IsabSoft">
  </div>
</header>

<!-- CONTENIDO PRINCIPAL -->
<div class="container">
  <!-- Aquí van tus formularios, tablas, botones... -->
</div>

<!-- MENÚ INFERIOR APP -->
<div class="menu-app">
  <button><span>🐄</span>Animales</button>
  <button><span>💰</span>Gastos</button>
  <button><span>📊</span>Reportes</button>
  <button><span>⚙️</span>Configuración</button>
</div>

<!-- JS -->
<script src="app.js"></script>
<script>
window.addEventListener('load', ()=>{
  const splash = document.getElementById('splash-screen');
  setTimeout(()=>{
    splash.style.opacity='0';
    setTimeout(()=>{ splash.style.display='none'; },500);
  },1500);
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js')
  .then(()=>console.log("Service Worker registrado ✅"))
  .catch(err=>console.log("Error SW:",err));
}
</script>

</body>
</html>
