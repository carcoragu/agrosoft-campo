<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroSoft | Campo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">
<style>
/* CSS simplificado: gradiente, tablas, botones, inputs */
body{font-family:Arial,sans-serif;margin:0;color:#fff;background:#203a43;}
header{text-align:center;padding:20px;background:#0a1f2e;}
.container{padding:15px;}
input, select, textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;font-size:14px;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:10px;font-size:16px;font-weight:bold;background:#28a745;color:white;}
.table{margin-top:15px;background:white;color:black;border-radius:10px;padding:10px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th, td{padding:6px;border-bottom:1px solid #ccc;font-size:13px;}
.total{margin-top:15px;font-size:18px;font-weight:bold;text-align:right;}
</style>
</head>
<body>

<header>
<h1>AgroSoft | Campo</h1>
<small>IsabSoft Soluciones Oportunas</small>
</header>

<div class="container">
<!-- Formulario y tablas de compra (igual que tu código anterior) -->
<!-- Incluye campos: número de compra, proveedor, CI/RUC, documento -->
<!-- Detalle de animales y gastos -->
<!-- Botón historial (Premium/PRO) -->
<div id="btnHistorial" style="display:none">
<button onclick="verHistorial()">Historial de Compras</button>
</div>
<input type="text" id="clavePlan" placeholder="Ingrese clave de plan">
<button onclick="activarPlan(document.getElementById('clavePlan').value)">Activar Plan</button>
<hr>
<button onclick="exportarCompraYGastosCSV()">Exportar Compra + Gastos CSV</button>
</div>

<script src="db.js"></script>
<script src="licencia.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(()=>console.log("App lista para usar offline"));
}
</script>
</body>
</html>
