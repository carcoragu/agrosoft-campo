<!DOCTYPE html>
<html lang="es">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#28a745">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgroSoft | Compra de Animales</title>

<style>
/* ---------- Estilos generales ---------- */
body{
  font-family: Arial, sans-serif;
  margin:0;
  background: #203a43;
  background: -webkit-linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}
header{
  text-align:center;
  padding:20px;
  background:#0a1f2e;
  display:flex;
  align-items:center;
  justify-content:center;
}
header h1{
  margin:0;
  font-size:22px;
}
header small{
  display:block;
  font-size:12px;
  color:#ccc;
}
.logo-animada {
  width: 80px;
  margin-right: 15px;
  animation: girar 5s linear infinite;
}
@keyframes girar {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(180deg); }
  100% { transform: rotate(360deg); }
}
.container{
  padding:15px;
}
input, select, textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  font-size:14px;
}
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:bold;
  background:#28a745;
  color:white;
}
button.secondary{
  background:#007bff;
}
button.danger{
  background:#dc3545;
}
.table{
  margin-top:15px;
  background:white;
  color:black;
  border-radius:10px;
  padding:10px;
  overflow-x:auto;
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:6px;
  border-bottom:1px solid #ccc;
  font-size:13px;
}
.total{
  margin-top:15px;
  font-size:18px;
  font-weight:bold;
  text-align:right;
}
</style>

</head>
<body>

<header>
  <img src="logoisabsoft.png" class="logo-animada">
  <div>
    <h1>AgroSoft | Campo</h1>
    <small>IsabSoft Soluciones Oportunas</small>
  </div>
</header>

<div class="container">

<h3>Datos de la Compra</h3>
<label>Nº Compra</label>
<input type="text" id="numeroCompra" readonly>
<label>Fecha</label>
<input type="date" id="fecha">
<label>Proveedor</label>
<input type="text" id="proveedor">
<label>CI / RUC</label>
<input type="text" id="ci">
<label>Documento</label>
<input type="text" id="documento">

<hr>

<h3>Detalle de Animales</h3>
<input type="text" id="caravana" placeholder="Nº Caravana">
<input type="number" id="peso" placeholder="Peso Vivo (kg)">
<input type="number" id="precioKg" placeholder="Precio por Kg (Gs.)">
<input type="number" id="precioAnimal" placeholder="Precio Cerrado (Gs.)">
<button onclick="agregarAnimal()">Agregar Animal</button>

<div class="table">
<table id="tablaAnimales">
<thead>
<tr>
<th>Caravana</th>
<th>Peso</th>
<th>Precio Kg</th>
<th>Precio Cerrado</th>
<th>Total Gs.</th>
<th>X</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="total">
Total Animales: ₲ <span id="totalAnimales">0</span><br>
Precio real de costo por animal: ₲ <span id="precioReal">0</span>
</div>

<hr>

<h3>Gastos de la Operación</h3>
<label>Fecha</label>
<input type="date" id="fechaGasto">
<label>Tipo de Gasto</label>
<select id="tipoGastoCompra">
<option value="flete">Flete</option>
<option value="comision">Pago de Comisión</option>
<option value="colcat">Pago a COLCAT</option>
<option value="varios">Varios</option>
</select>
<label>Cantidad</label>
<input type="number" id="cantidadGastoCompra" placeholder="Cantidad">
<label>Importe Unitario</label>
<input type="number" id="importeUnitarioGastoCompra" placeholder="Importe Unitario">
<label>Observación</label>
<textarea id="obsGastoCompra" placeholder="Observación"></textarea>
<button onclick="agregarGastoCompra()">Agregar Gasto</button>

<div class="table">
<table id="tablaGastosCompra">
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Total</th>
<th>X</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="total">
Total Gastos: ₲ <span id="totalGastosCompra">0</span>
</div>

<hr>
<button onclick="exportarCompraYGastosCSV()">Exportar Compra + Gastos CSV</button>

<script>
// --- Sistema de prueba 30 días ---
(function(){
    const hoy = new Date();
    const fechaInicio = localStorage.getItem("fechaInicio");
    if(!fechaInicio){
        localStorage.setItem("fechaInicio", hoy.toISOString());
    } else {
        const inicio = new Date(fechaInicio);
        const diffDias = Math.floor((hoy - inicio) / (1000*60*60*24));
        if(diffDias > 31){
            alert("El período de funcionalidad ha finalizado, necesita mantenimiento.");
            document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;color:red;'>Período de funcionalidad finalizado</h2>";
            throw new Error("Fin del período de funcionalidad operativa");
        }
    }
})();

// --- Contador de compras ---
let contadorCompra = localStorage.getItem("contadorCompra") || 1;
function actualizarNumeroCompra(){
    document.getElementById("numeroCompra").value = "COMP-" + String(contadorCompra).padStart(4,'0');
}
actualizarNumeroCompra();
document.getElementById("fecha").valueAsDate = new Date();

let totalGastosCompra = 0;

function actualizarTablaGastosCompra(){ /* código igual que antes */ }
function eliminarGastoCompra(i){ /* código igual que antes */ }
function limpiarCamposGastoCompra(){ /* código igual que antes */ }
function actualizarPrecioReal(){ /* código igual que antes */ }

function exportarCompraYGastosCSV(){ /* código igual que antes */ }

// --- Registrar Service Worker para modo offline ---
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(function() {
      console.log("App lista para usar offline");
    });
}
</script>

</body>
</html>
